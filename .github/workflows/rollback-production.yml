name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Exact 40-character known-good commit SHA
        required: true
        type: string
      reason:
        description: Optional rollback reason
        required: false
        type: string

concurrency:
  group: client-production-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rollback:
    name: Roll back approved SHA
    runs-on: ubuntu-latest
    environment: client-production
    concurrency:
      group: production-branch-ref
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and restore production tree
        env:
          INPUT_SHA: ${{ inputs.sha }}
          ROLLBACK_REASON: ${{ inputs.reason }}
        run: |
          if ! [[ "$INPUT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::sha must be an exact lowercase 40-character commit SHA"
            exit 1
          fi

          git fetch --no-tags origin "+refs/heads/*:refs/remotes/origin/*"

          if ! git cat-file -e "$INPUT_SHA^{commit}"; then
            echo "::error::$INPUT_SHA is not a commit object reachable from origin"
            exit 1
          fi

          current_sha="$(git ls-remote origin refs/heads/production | awk '{print $1}')"
          if [ -z "$current_sha" ]; then
            echo "::error::origin production branch was not found"
            exit 1
          fi

          git checkout -B production "$current_sha"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          target_tree="$(git rev-parse "$INPUT_SHA^{tree}")"

          echo "Restoring production forward from $current_sha to tree at $INPUT_SHA"
          if [ -n "$ROLLBACK_REASON" ]; then
            echo "Reason: $ROLLBACK_REASON"
          fi

          git read-tree -u --reset "$INPUT_SHA"

          commit_message="rollback: restore production to ${INPUT_SHA}"
          if git diff --cached --quiet; then
            git commit --allow-empty -m "$commit_message"
          else
            git commit -m "$commit_message"
          fi

          restored_tree="$(git rev-parse HEAD^{tree})"
          if [ "$restored_tree" != "$target_tree" ]; then
            echo "::error::restored tree $restored_tree does not match target tree $target_tree"
            exit 1
          fi

          git push origin HEAD:refs/heads/production
          echo "Production branch now points at $(git rev-parse HEAD), with tree restored to $INPUT_SHA"
